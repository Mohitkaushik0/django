<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #FFFC00, #ffe600);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #000;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #f2f2f2;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      background: #e6e6e6;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 25px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #333;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    .logo {
      font-size: 40px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="logo">👻</div>
  <h2>Create Account</h2>

  <form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password1" placeholder="Password" required>
    <input type="password" name="password2" placeholder="Confirm Password" required>

    <button type="submit">Sign Up</button>
  </form>

  <div class="link">
    Already have an account? <a href="/login/">Login</a>
  </div>

</div>

</body>
</html>
